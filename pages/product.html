<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>

/* BODY */
body{
margin:0;
font-family:Arial;
background:#fafafa;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:10px 20px;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo img{height:40px;}

ul{display:flex;gap:15px;list-style:none;}
ul a{text-decoration:none;color:#333;font-weight:bold;}

/* PRODUCT BOX */
.container{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

/* IMAGE */
.image-box img{
width:280px;
height:360px;
object-fit:cover;
border-radius:10px;
}

/* DETAILS */
.details{
max-width:320px;
}

/* PRICE */
.price{
color:#ff3f6c;
font-size:20px;
font-weight:bold;
}

/* SIZE BUTTON */
.size-btn{
padding:6px 10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:5px;
font-size:13px;
}

.size-btn:hover{
border-color:#ff3f6c;
}

/* QTY */
.qty-box{
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}

.qty-box button{
padding:5px 10px;
font-size:14px;
background:#ff3f6c;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.qty-box span{
font-size:14px;
min-width:25px;
text-align:center;
}

/* ADD BUTTON */
.add-btn{
width:100%;
padding:8px;
margin-top:15px;
background:#ff3f6c;
color:white;
border:none;
border-radius:5px;
font-size:14px;
cursor:pointer;
}

/* BACK */
.back-btn{
margin-top:10px;
padding:6px;
width:100%;
background:#eee;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="../assets/branding/logo.svg">
</div>

<ul>
<li><a href="../index.html">Home</a></li>
<li><a href="collection.html">Collection</a></li>
<li><a href="wishlist.html">Wishlist</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<!-- PRODUCT -->
<div class="container">

<div class="image-box">
<img id="img">
</div>

<div class="details">

<h2 id="name"></h2>
<p>⭐⭐⭐⭐☆ (4.5)</p>
<p class="price" id="price"></p>

<!-- SIZE -->
<div>
<p><b>Select Size</b></p>
<button class="size-btn" onclick="selectSize('S')">S</button>
<button class="size-btn" onclick="selectSize('M')">M</button>
<button class="size-btn" onclick="selectSize('L')">L</button>
<button class="size-btn" onclick="selectSize('XL')">XL</button>
<button class="size-btn" onclick="selectSize('XXL')">XXL</button>
</div>

<p id="sizeText" style="color:#ff3f6c;font-size:13px;">Size not selected</p>

<!-- QTY -->
<div class="qty-box">
<button onclick="dec()">-</button>
<span id="qty">1</span>
<button onclick="inc()">+</button>
</div>

<!-- BUTTON -->
<button class="add-btn" onclick="add()">Add to Bag</button>
<button class="back-btn" onclick="goBack()">⬅ Back</button>

</div>

</div>

<script>

let product = JSON.parse(localStorage.getItem("product"));
let qty = 1;
let size = null;

/* LOAD */
if(product){

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹"+product.price;

/* IMAGE FIX */
let path = product.image;

if(!path.includes("../")){
path = "../" + path;
}

document.getElementById("img").src = path;

document.getElementById("img").onerror = function(){
this.src="../assets/products/default.jpg";
};

}

/* SIZE */
function selectSize(s){
size = s;
document.getElementById("sizeText").innerText = "Selected: "+s;
}

/* QTY */
function inc(){
qty++;
document.getElementById("qty").innerText = qty;
}

function dec(){
if(qty>1){
qty--;
document.getElementById("qty").innerText = qty;
}
}

/* ADD */
function add(){

if(!size){
alert("Select size");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:product.name,
price:product.price,
image:product.image,
size:size,
quantity:qty
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart");

}

/* BACK */
function goBack(){
window.history.back();
}

</script>

</body>
</html>
