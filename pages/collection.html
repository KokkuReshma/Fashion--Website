<style>

/* BODY */
body{
    margin:0;
    font-family:Arial;
    background:#f9f9f9;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#fff;
}

.logo img{height:40px;}

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    text-decoration:none;
    color:#333;
    font-weight:bold;
}

/* HEADER */
.scroll-text{
    overflow:hidden;
    white-space:nowrap;
    background:#ffe6ef;
}

.scroll-text span{
    display:inline-block;
    padding:10px;
    font-size:22px;
    animation:scroll 10s linear infinite;
    background:linear-gradient(90deg, red, orange, pink, purple, blue);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

@keyframes scroll{
    from{transform:translateX(100%);}
    to{transform:translateX(-100%);}
}

/* FILTER */
.filter-bar{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:10px;
    background:#ffe6ef;
}

/* PRODUCTS GRID */
.gallery{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#fff;
    padding:10px;
    border-radius:10px;
    text-align:center;
    position:relative;
    cursor:pointer;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* ❤️ */
.wishlist-btn{
    position:absolute;
    top:8px;
    right:8px;
    border:none;
    background:#fff;
    border-radius:50%;
    cursor:pointer;
}

/* PRICE */
.price{
    color:#ff3f6c;
    font-weight:bold;
}

/* QTY */
.qty-box{
    display:flex;
    justify-content:center;
    gap:5px;
}

/* ➕➖ BUTTONS */
.qty-box button{
    background:#ff3f6c;
    color:#fff;
    border:none;
    padding:4px 8px;
    border-radius:4px;
}

/* ADD BUTTON */
.add-btn{
    background:#ff3f6c;
    color:#fff;
    border:none;
    padding:6px 12px;
    margin-top:5px;
    border-radius:5px;
    cursor:pointer;
}
/* FOOTER */
footer{
    background:#ff4d79;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

footer a{
    color:#fff;
    text-decoration:none;
    margin:0 5px;
}


</style>
</head>

/* RENDER */
function renderProducts(list){
let grid=document.getElementById("productGrid");
grid.innerHTML="";

list.forEach(p=>{

grid.innerHTML+=`
<div class="card" onclick='openProduct(${JSON.stringify(p)})'>

<button class="wishlist-btn" onclick="event.stopPropagation()">❤️</button>

<img src="${p.image}" onerror="this.src='../assets/products/default.jpg'">

<h3>${p.name}</h3>
<p>⭐⭐⭐⭐ (${p.rating})</p>
<p class="price">₹${p.price}</p>

<div class="qty-box">
<button onclick="event.stopPropagation();changeQty(this,-1)">-</button>
<span class="qty">0</span>
<button onclick="event.stopPropagation();changeQty(this,1)">+</button>
</div>

<button class="add-btn" onclick="event.stopPropagation();addToCart('${p.name}',${p.price})">
Add
</button>

</div>`;
});
}

/* FIXED QTY */
function changeQty(btn,val){
let span=btn.parentElement.querySelector(".qty");
let q=parseInt(span.innerText)+val;
if(q<0) q=0;
span.innerText=q;
}

/* FIXED PRODUCT OPEN */
function openProduct(product){
localStorage.setItem("product",JSON.stringify(product));
window.location.href="product.html";
}

/* FILTER */
function applyFilters(){
let search=document.getElementById("searchInput").value.toLowerCase();
let category=document.getElementById("categoryFilter").value;

let filtered=products.filter(p=>{
return (category==="all" || p.category===category)
&& p.name.toLowerCase().includes(search);
});

renderProducts(filtered);
}

renderProducts(products);
