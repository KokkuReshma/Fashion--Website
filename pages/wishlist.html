<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wishlist</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav>
<h2>❤️ Wishlist</h2>
<a href="collection.html">Back to Shop</a>
</nav>

<section class="gallery" id="wishlistItems"></section>

<script>
function displayWishlist() {
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let container = document.getElementById("wishlistItems");

if(wishlist.length === 0){
container.innerHTML = "<h2>No items in wishlist</h2>";
return;
}

container.innerHTML = "";

wishlist.forEach((item,index) => {
let div = document.createElement("div");
div.className = "card";

// Fix image path typo for 'lehanga' -> 'lehenga'
let imgPath = item.image ? item.image.replace('lehanga', 'lehenga') : '../assets/products/default.jpg';

// If image file does not exist, fallback handled by onerror

div.innerHTML = `
<img src="${imgPath}" onerror="this.src='../assets/products/default.jpg'">
<h3>${item.name}</h3>
<p class="price">₹${item.price}</p>

<button onclick="addToCart('${item.name}',${item.price})">Add to Cart</button>
<button onclick="removeFromWishlist(${index})">Remove</button>
`;

container.appendChild(div);
});
}

function removeFromWishlist(index){
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
wishlist.splice(index,1);
localStorage.setItem("wishlist", JSON.stringify(wishlist));
displayWishlist();
}

displayWishlist();
</script>

</body>
</html>
