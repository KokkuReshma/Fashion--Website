<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <!-- Multicolor Gradient -->
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3f6c;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#ff6f91;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4269f;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#8b2d7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3f6c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary Gradient -->
    <linearGradient id="gradSecond" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4269f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6f91;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc0cb;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- White Background -->
  <rect width="300" height="120" fill="white" rx="10"/>
  
  <!-- Decorative Border -->
  <rect width="300" height="120" fill="none" stroke="#ff3f6c" stroke-width="2" rx="10"/>
  
  <!-- Decorative Circle Top Left -->
  <circle cx="20" cy="20" r="6" fill="#d4269f" opacity="0.7"/>
  
  <!-- Decorative Circle Bottom Right -->
  <circle cx="280" cy="100" r="6" fill="#ff6f91" opacity="0.7"/>
  
  <!-- Main Text Group -->
  <g filter="url(#shadow)">
    <!-- "Reshma" in Rainbow Gradient -->
    <text x="150" y="48" font-family="'Poppins', Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="url(#gradMain)" letter-spacing="1">
      Reshma
    </text>
    
    <!-- "Designers" in Secondary Gradient -->
    <text x="150" y="90" font-family="'Poppins', Arial, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="url(#gradSecond)" letter-spacing="0.5">
      Designers
    </text>
  </g>
  
  <!-- Decorative Elements -->
  <path d="M 15 35 Q 20 38 25 35" stroke="#ff3f6c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 275 85 Q 280 88 285 85" stroke="#d4269f" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
